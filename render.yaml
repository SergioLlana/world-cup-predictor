# Render Blueprint for the public wcpred dashboard.
# Deploy: push this repo to GitHub, then in Render → New → Blueprint, point it
# at the repo. Render reads this file and creates the service.
#
# WCPRED_PUBLIC=1 locks the deploy down: no data refresh, no Connectivity tab.
# All three engines are served, bayes included even though CmdStan isn't
# installed here: its tabs read committed CSVs and /api/matrix reads the
# precomputed data/matrices/ CSVs (`wcpred matrices`). The date-stamped CSVs
# under data/ travel in git, so a `git push` after regenerating them locally
# updates the public site (auto-deploy).
services:
  - type: web
    name: wcpred-web
    runtime: python
    plan: free            # free dyno sleeps after ~15 min idle; bump to starter for always-on
    buildCommand: pip install -e ".[web]"
    startCommand: uvicorn webapp.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WCPRED_PUBLIC
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.9"
